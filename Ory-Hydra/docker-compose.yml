services:
  mock-ui:
    build: .
    container_name: mock-ui
    ports:
      - "3000:3000"
    restart: always
    networks:
      - netsec-bridge
  sqlite:
    image: busybox
    volumes:
      - hydra-sqlite:/mnt/sqlite
    command: "chmod -R 777 /mnt/sqlite"
  hydra:
    # image: oryd/hydra:v25.4.0
    # build:
    #   context: .
    #   dockerfile: .docker/Dockerfile-local-build
    ports:
      - "4444:4444" # Public port
      - "4445:4445" # Admin port
      - "5555:5555" # Port for hydra token user
    command: serve -c /etc/config/hydra/hydra.yml all --dev
    volumes:
      - hydra-sqlite:/mnt/sqlite:rw
      - type: bind
        source: ./config
        target: /etc/config/hydra
    # pull_policy: missing
    environment:
      - DSN=sqlite:///mnt/sqlite/db.sqlite?_fk=true&mode=rwc
    restart: unless-stopped
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    networks:
      - intranet
      - netsec-bridge
    image: oryd/hydra:v26.2.0
  hydra-migrate:
    # image: oryd/hydra:v25.4.0
    # build:
    #   context: .
    #   dockerfile: .docker/Dockerfile-local-build
    environment:
      - DSN=sqlite:///mnt/sqlite/db.sqlite?_fk=true&mode=rwc
    command: migrate -c /etc/config/hydra/hydra.yml sql up -e --yes
    # pull_policy: missing
    volumes:
      - hydra-sqlite:/mnt/sqlite:rw
      - type: bind
        source: ./config
        target: /etc/config/hydra
    restart: on-failure
    networks:
      - intranet
    depends_on:
      sqlite:
        condition: service_completed_successfully
    image: oryd/hydra:v26.2.0

networks:
  intranet:
  netsec-bridge:
    external: true
volumes:
  hydra-sqlite: